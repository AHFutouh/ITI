<html>
<head>
<script>

    function whichKey(e)
    {
        alert("you pressed: "+e.key);
        alert(e.cancelable);
        if(e.key == "a"){
            e.preventDefault();
        }
		
    }

    function closeWin(e)
    {
        if(e.altKey)
            window.close();
    }

</script>
</head>
<body onkeydown="closeWin(event)">

<input type="text" onkeydown="whichKey(event)">

<div>Press Alt to close the window</div>
<script>
   
</script>
</body>
</html>
