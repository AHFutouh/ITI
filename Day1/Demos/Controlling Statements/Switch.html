<html>
	<head>
		<title> Javascript </title>
		
		<script type="text/javascript">
			//You will receive a different greeting based
			//on what day it is. Note that Sunday=0,
			//Monday=1, Tuesday=2, etc.

			var d=2;
			
			switch (d)
			{
				case 2:
				  document.write("d equal 2");
				  break;
				case 5:
				  document.write("d equal 5");
				  break;
				case 0:
				  document.write("d equal 0");
				  break;
				default:
				  document.write("d is not 2 or 5 or 0");
			}
		</script> 
	</head>
	
	<body>
		
	</body>

</html>
