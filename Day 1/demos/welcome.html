<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Interactive Upload Demo</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      max-width: 500px;
    }

    .card {
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 20px;
    }

    progress,
    meter {
      width: 100%;
      height: 20px;
    }

    button {
      margin-top: 10px;
      padding: 8px 12px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <!-- Upload Progress -->
  <div class="card">
    <h3>Uploading File...</h3>
    <progress id="uploadProgress" value="0" max="100"></progress>
    <p id="progressText">0% completed</p>
    <button onclick="startUpload()">Start Upload</button>
  </div>

  <!-- Storage Usage -->
  <div class="card">
    <h3>Storage Usage</h3>
    <meter id="storageMeter" value="0.5" min="0" max="1"></meter>
    <p id="storageText">50% of storage used</p>
  </div>

  <details>
    <summary>ITI</summary>
    <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Commodi, nesciunt exercitationem doloremque ullam illum
      cumque corrupti, dolores sapiente sit fuga tenetur incidunt. Eius culpa quaerat quod. Rerum eum quisquam eaque.
    </p>
  </details>
  <audio controls id="myaudio">
    <source src="audio/bgsound.mp3" type="audio/mpeg">
    <source src="audio/bgsound.wav" type="audio/wav">

    Your browser does not support the audio element.
  </audio>

  <input type="button" onclick="startSound()" value="Play Sound">
  <input type="button" onclick="stopSound()" value="Stop Sound">

  <script>
    function startUpload() {
      let progress = 0;
      const progressBar = document.getElementById("uploadProgress");
      const progressText = document.getElementById("progressText");

      const interval = setInterval(() => {
        progress += 1;
        progressBar.value = progress;
        progressText.textContent = progress + "% completed";

        if (progress >= 100) {
          clearInterval(interval);
          updateStorage();
        }
      }, 50); // speed of animation
    }

    function updateStorage() {
      const meter = document.getElementById("storageMeter");
      const text = document.getElementById("storageText");

      let current = meter.value;
      current += 0.1; // simulate added file size

      if (current > 1) current = 1;

      meter.value = current;
      text.textContent = Math.round(current * 100) + "% of storage used";
    }

    function startSound() {
      document.getElementById("myaudio").play();
    }

    function stopSound(){
      document.getElementById("myaudio").pause();
    }
  </script>

</body>

</html>
