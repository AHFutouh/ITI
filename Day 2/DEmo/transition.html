<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
   <style>
     div{
        width:100px;
        height: 100px;
        border: 4px solid red;
        /* transition :width 2s,border 5s; */
        transition: 4s;
        transition-delay: 2s;
    }
    div:hover{
        font-size: 100px;
        /* width:200px;
        border: 10px dotted blue; */
    }
    img{
        width:100px;
        height: 100px;
        opacity: 1;
        transition: opacity 4s ;
    }
    img:hover{
        opacity: .3;
    }
    canvas{
        width:500px;
        height: 500px;
        border:3px solid red;
    }
   </style>
</head>
<body>
    <!-- <div> Hello</div>

    <img src="1.png"> -->

    <canvas id="cs"></canvas>
    <script>
         var canvas=document.getElementById("cs");
         var context=canvas.getContext("2d");
         context.rotate(45);
         context.translate(50,50);
         context.fillRect(0,0,100,100);
        </script>
</body>
</html>
