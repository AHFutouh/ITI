<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Animation - Snake</title>
    <style>
        .snake {
            width: 200px;
            height: 50px;
            margin: 20px auto;
            position: relative;
        }

        .snake span {
            display: block;
            width: 20px;
            height: 20px;
            background-color: #3498DB;
            position: absolute;
            bottom: 0;
            border-radius: 50%;
            animation: Snake 1.5s infinite ease-in-out;
            opacity: 0.5;
        }

        span:nth-of-type(2) {
            left: 20px;
            animation-delay: 0.2s;
        }

        span:nth-of-type(3) {
            left: 40px;
            animation-delay: 0.4s;
        }

        span:nth-of-type(4) {
            left: 60px;
            animation-delay: 0.6s;
        }

        span:last-of-type {
            left: 80px;
            animation-delay: 0.8s;
        }

        @keyframes Snake {

            0%,
            100% {
                opacity: 0.3;
                transform: translateY(0);
                box-shadow: 0 0 3px rgb(0, 0, 0, 0.5);
            }

            50% {
                opacity: 1;
                transform: translateY(-10px);
                background-color: deepskyblue;
                box-shadow: 0 20px 3px rgb(0, 0, 0, 0.1);
            }
        }
    </style>
</head>

<body>
    <div class="snake">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </div>
</body>

</html>
