<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Transition</title>
    <style>
        div {
            width: 1000px;

        }

        div>p {
            width: 200px;
            height: 100px;
            margin-bottom: 20px;
            background-color: aquamarine;
            transition-property: width, background-color;
            transition-duration: 3s, 5s;
            /*transition-delay: 2s; // default 0*/
        }

        div p:first-of-type {
            transition-timing-function: ease;
        }

        div p:nth-of-type(2) {
            transition-timing-function: linear;
        }

        div p:nth-of-type(3) {
            transition-timing-function: ease-in;
        }

        div p:nth-of-type(4) {
            transition-timing-function: ease-out;
        }

        div p:nth-of-type(4) {
            transition-timing-function: ease-in-out;
        }

        div p:last-of-type {
            transition-timing-function: steps(4, start); /*default end*/
        }

        div:hover p {
            width: 600px;
            background-color: #F00;
        }

        div.test {
            width: 300px;
            height: 300px;
            background-color: cyan;
            transition: all 0.5s ease-in-out;
            padding: 10px;
            margin: 120px auto;
            line-height: 280px;
            text-align: center;
            font-size: 50px;
        }

        div.test:hover {
            /*opacity: 0.5;*/
            background-color: cadetblue;
            transform: scale(1.4) rotateZ(45deg);
            box-shadow: 15px 15px 20px 10px #f00 inset,
                -15px -15px 20px 10px #f00 inset;
        }
    </style>
</head>

<body>
    <div>
        <p>Ease</p>
        <p>Linear</p>
        <p>Ease-in</p>
        <p>Ease-out</p>
        <p>Ease-in-out</p>
        <p>Steps-[Start|End]</p>
    </div>

    <div class="test">
        Transition
    </div>

</body>

</html>
