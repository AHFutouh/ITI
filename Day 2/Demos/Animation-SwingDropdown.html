<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Animation - Swing Dropdown</title>
    <style>
        * {
            box-sizing: border-box;
        }

        .container {
            width: 250px;
            height: 50px;
            margin: 50px;
            float: left;
            font-family: Arial, Tahoma;
            font-weight: bold;
            text-align: center;
        }

        .container:hover a {
            top: 0;
        }

        .container .box {
            width: 100%;
            height: 50px;
            line-height: 50px;
            position: relative;
            color: #FFF;
            z-index: 2;
        }

        .container a {
            text-decoration: none;
            display: inline-block;
            height: 50px;
            line-height: 50px;
            background-color: #333;
            color: #FFF;
            width: 100%;
            position: relative;
            top: -50px;
            z-index: 1;
        }

        .normal .box {
            background-color: #62C8F8;
        }

        .normal:before {
            display: block;
            padding: 10px;
            margin-bottom: 10px;
            content: "Normal Hover";
        }

        .transition .box {
            background-color: #3B5998;
        }

        .transition:before {
            display: block;
            padding: 10px;
            margin-bottom: 10px;
            content: "Transition Hover";
        }

        .transition:hover a {
            transition: all 0.5s ease-in-out;
        }

        .animation .box {
            background-color: #C8302A;
        }

        .animation:before {
            display: block;
            padding: 10px;
            margin-bottom: 10px;
            content: "Animation Hover";
        }

        .animation:hover a {
            transform-origin: top;
            animation: Swinging 1.5s ease-in-out;
        }

        @keyframes Swinging {
            0% {
                transform: rotateX(-50deg);
            }

            20% {
                transform: rotateX(50deg);
            }

            40% {
                transform: rotateX(-30deg);
            }

            60% {
                transform: rotateX(30deg);
            }

            80% {
                transform: rotateX(-30deg);
            }

            100% {
                transform: rotateX(0);
            }
        }
    </style>
</head>

<body>
    <div class="container normal">
        <div class="box">Follow Me On Twitter</div>
        <a href="#">@SaraAli</a>
    </div>

    <div class="container transition">
        <div class="box">Follow Me On Facebok</div>
        <a href="#">Sara Ali</a>
    </div>

    <div class="container animation">
        <div class="box">Subscribe On Youtube</div>
        <a href="#">SaraAli</a>
    </div>
</body>

</html>
