<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Transform - Backface-Visibility</title>
    <style>
        /*
        مهمه جدا لما تعمل 3 دي وتعمل كارد بيلف
        من اسمها ضهر العنصر هيظهر ولا لأ
        لما بعمل لف في اتجاه Y 
        للعنصر بشوف الباك لو خليتها Hidden هتختفي ضهره 
        ويظهر لو في عنصر تاني وراه 
        */


        body {
            perspective: 500px;
            /*علشان اللفه تبقي مجسمه لو شيلتها طريقه اللف هتختلف*/
        }

        .parent {
            width: 300px;
            height: 300px;
            margin: 50px auto;
            transition: all 1s ease-in-out;
            position: relative;
            transform-style: preserve-3d;
            /* لازم علشان اقدر اشوف العنصر اللي وراه ويحافظ علي الثري ديه*/
        }

        .parent:hover {
            transform: rotateY(180deg)
        }

        .parent>div {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            color: #FFF;
            text-align: center;
            line-height: 300px;
            font-size: 30px;
        }

        .front {
            background-color: #199119;
            z-index: 2;
            backface-visibility: hidden;
            /* علشان يخفي الضهر بتاعه ويظهر العنصر اللي وراه الازرق*/
        }

        .back {
            background-color: #00F;
            z-index: 1;
            transform: rotateY(180deg);
            /*علشان لما العنصر الاب يلف هيلفه معاه فاحنا بنعدله */
        }
    </style>
</head>

<body>
    <div class="parent">
        <div class="front">This is Front</div>
        <div class="back">This is Back</div>
    </div>
</body>

</html>
