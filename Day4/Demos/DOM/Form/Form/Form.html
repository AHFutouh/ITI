<!doctype html>
<html>
    <head>
       
    </head>
    <body>
        <form name="myForm"  action="thanks.html" method="get" onsubmit="check(event)">
            user name <input id="user" type="text" value="Enter your name" onfocus="clearTxt(this)"><br>
            <input  type="submit" value="submit">
            <input type="reset">
        </form>
		
        
		 <script>
		
			//console.log(document.forms[0].elements)
			//document.forms[0].submit();
			//document.getElementById("user").disabled=true;
			//document.getElementById("user").select();
            function check(event)
            {
                event.preventDefault();
                if(document.getElementById("user").value.length>3)
                {
                    event.target.submit();
                }
                else
                {
                    
                    document.getElementById("user").focus();
                }

            }

            function clearTxt(txt)
            {
                if(txt.value=="Enter your name")
                    txt.value="";
            }
        </script>
    </body>
</html>
