<!DOCTYPE html>
<html>
	<body>

		<p id="demo">Click the button to change the text in this paragraph.</p>

		<button onclick="myFunction()">Try it</button>

		<script>
			function myFunction() {
				const p = document.getElementById("demo");
				p.innerHTML = "Hello World";
				console.log(p);
			}
		</script>

	</body>
</html>
