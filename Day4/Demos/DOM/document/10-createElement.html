<html>
    <head></head>
    <body>
        <script>
            let div = document.createElement('div');
            div.id = 'content';
            div.className = 'note';
            div.innerHTML = '<p>CreateElement example</p>';

            document.body.appendChild(div);


            let h2 = document.createElement('h2');
            h2.textContent = 'Add h2 element to the div';
            div.appendChild(h2);
        </script>
    </body>
</html>
