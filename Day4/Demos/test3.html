    <input type="button" value="Show" onclick="showSelected()">
    <script>
        var uni = document.getElementById('uni');
        console.log(uni.length);
        function show(){
            var selected = uni.selectedIndex;
            var option = uni.options[selected];
            alert(option.value);
        }

        function showSelected(){
            for(var i = 0; i<uni.length ; i++){
                if(uni[i].selected){
                    alert(uni[i].text);
                    if(uni[i].text == "Asyut"){
                        uni[i].remove();
                    }
                }
            }
        }
        var myForm = document.getElementById('myForm');

        function clearForm(){
            myForm.submit();
        }

            document.getElementById('btn').disabled = false;

        }
        function chk(){
            document.getElementById('ch1').click()
        }
